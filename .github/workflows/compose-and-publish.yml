name: Compose and Publish Templates

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-24.04
    outputs:
      on-main: ${{ steps.check.outputs.on-main }}
      matrix: ${{ steps.load-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - id: check
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if git branch -r --contains "${{ github.sha }}" | grep -q '^\s*origin/main$'; then
            echo "on-main=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Tag ${REF_NAME} does not point to a commit on main — skipping publish."
            echo "on-main=false" >> "$GITHUB_OUTPUT"
          fi
      - id: load-matrix
        run: |
          matrix=$(jq -c '[.[] | {overlay: .overlay, repo: .repo}]' templates.json)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  compose-and-publish:
    needs: guard
    if: needs.guard.outputs.on-main == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    concurrency:
      group: compose-publish-${{ matrix.overlay }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.guard.outputs.matrix) }}
    steps:
      - name: Pre-flight — verify TEMPLATE_PUSH_TOKEN
        env:
          GH_TOKEN: ${{ secrets.TEMPLATE_PUSH_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::TEMPLATE_PUSH_TOKEN secret is not set. Publishing requires a PAT with push access to downstream template repos."
            exit 1
          fi
          echo "TEMPLATE_PUSH_TOKEN: present"

      - name: Checkout composition workspace
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Compose template
        env:
          TAG: ${{ github.ref_name }}
          OVERLAY: ${{ matrix.overlay }}
        run: bash compose.sh --only "${OVERLAY}"

      - name: Clone target template repo
        env:
          GH_TOKEN: ${{ secrets.TEMPLATE_PUSH_TOKEN }}
          TARGET_REPO: ${{ matrix.repo }}
        run: |
          git config --global credential.helper store
          printf 'protocol=https\nhost=github.com\nusername=x-access-token\npassword=%s\n\n' "${GH_TOKEN}" \
            | git credential approve
          git clone "https://github.com/${TARGET_REPO}.git" target-repo

      - name: Sync composed output to target repo
        env:
          TARGET_REPO: ${{ matrix.repo }}
        run: |
          REPO_NAME=$(basename "${TARGET_REPO}")
          # Remove all tracked files except .git
          find target-repo -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          # Copy composed output
          cp -a "output/${REPO_NAME}/." target-repo/

      - name: Commit and push
        working-directory: target-repo
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Composed from TheSereyn.Templates@${TAG_NAME}"
            git push
          fi

      - name: Tag template repo
        working-directory: target-repo
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git tag -f "${TAG_NAME}"
          git push origin "${TAG_NAME}" --force
